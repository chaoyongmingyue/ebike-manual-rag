<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ DM6 说明书 · 分块数据看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --card-bg: #161b22; --border: #30363d;
    --text: #e6edf3; --text2: #8b949e; --accent: #58a6ff;
    --red: #f85149; --orange: #d2991d; --blue: #58a6ff; --green: #3fb950;
    --purple: #bc8cff; --cyan: #39d2c0; --gray: #8b949e;
    --st-fault: #E63946; --st-warn: #F4A261; --st-step: #457B9D;
    --st-param: #2A9D8F; --st-comp: #9B5DE5; --st-circuit: #00B4D8; --st-overview: #6C757D;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .header{background:#161b22;border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;flex-wrap:wrap}
  .header h1{font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px}
  .header .badge{background:rgba(88,166,255,.15);color:var(--accent);padding:4px 12px;border-radius:12px;font-size:13px;font-weight:500}
  .header .sub{font-size:12px;color:var(--text2);margin-left:auto}
  .container{max-width:1200px;margin:0 auto;padding:20px 24px}
  /* KPI Cards */
  .kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
  .kpi-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:18px 16px;text-align:center;transition:transform .2s,box-shadow .2s;cursor:default}
  .kpi-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.4)}
  .kpi-card .kpi-num{font-size:28px;font-weight:700;line-height:1.2}
  .kpi-card .kpi-label{font-size:12px;color:var(--text2);margin-top:4px}
  .kpi-card .kpi-icon{font-size:20px;margin-bottom:4px}
  .kpi-ok{color:var(--green)} .kpi-warn{color:var(--orange)} .kpi-danger{color:var(--red)}
  .kpi-accent{color:var(--accent)} .kpi-purple{color:var(--purple)}
  /* Charts */
  .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
  .chart-box{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:16px}
  .chart-box h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text);display:flex;align-items:center;gap:6px}
  .chart-box canvas{max-height:300px}
  /* Filters */
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
  .filters select,.filters input,.filters button{padding:8px 12px;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);outline:none;transition:border-color .15s}
  .filters select:focus,.filters input:focus{border-color:var(--accent)}
  .filters input{flex:1;min-width:140px}
  .filters label{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none}
  .filters label input[type=checkbox]{accent-color:var(--accent)}
  .filters .clear-btn{padding:8px 14px;cursor:pointer;transition:all .15s}
  .filters .clear-btn:hover{border-color:var(--red);color:var(--red)}
  /* Chunk cards */
  .chunk-card{background:var(--card-bg);border:1px solid var(--border);border-left:4px solid #30363d;border-radius:0 8px 8px 0;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
  .chunk-card:hover{border-color:#58a6ff;border-left-width:4px}
  .chunk-card .card-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
  .chunk-card .type-icon{font-size:15px;flex-shrink:0}
  .chunk-card .part-label{font-weight:600;font-size:13px;flex:1;min-width:120px}
  .chunk-card .token-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap}
  .t-red{background:rgba(248,81,73,.15);color:var(--red)}
  .t-green{background:rgba(63,185,80,.15);color:var(--green)}
  .t-yellow{background:rgba(210,153,29,.15);color:var(--orange)}
  .chunk-card .card-preview{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:6px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  /* Progress bar */
  .progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:6px;overflow:hidden}
  .progress-bar .fill{height:100%;border-radius:2px;transition:width .3s}
  /* Chips */
  .chips{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
  .chip{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
  .chip-comp{background:rgba(88,166,255,.12);color:var(--accent)}
  .chip-trip{background:rgba(210,153,29,.12);color:var(--orange)}
  .chip-domain{background:rgba(188,140,255,.12);color:var(--purple)}
  .chip-warn{background:rgba(248,81,73,.12);color:var(--red)}
  /* Expanded */
  .chunk-card.expanded{border-color:var(--accent)}
  .chunk-detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
  .chunk-card.expanded .chunk-detail{display:block}
  .detail-text{background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:14px;font-size:13px;line-height:1.7;white-space:pre-wrap;max-height:350px;overflow-y:auto;color:var(--text);margin-bottom:12px}
  .detail-section{margin-bottom:10px}
  .detail-section h4{font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
  .detail-section .val{font-size:13px;color:var(--text)}
  .triplet-card{background:rgba(210,153,29,.06);border:1px solid rgba(210,153,29,.2);border-radius:8px;padding:10px 14px;margin-bottom:6px;font-size:13px}
  .triplet-card .trip-row{display:flex;gap:8px;margin-bottom:3px;flex-wrap:wrap}
  .triplet-card .trip-label{font-weight:600;color:var(--orange);min-width:48px}
  /* Pagination */
  .pagination{display:flex;justify-content:center;align-items:center;gap:12px;padding:20px 0;font-size:14px}
  .pagination button{padding:8px 16px;background:var(--card-bg);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;color:var(--text);transition:all .15s}
  .pagination button:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
  .pagination button:disabled{opacity:.3;cursor:not-allowed}
  .pagination .page-info{color:var(--text2);font-size:13px}
  .pagination .total-info{color:var(--text2);font-size:12px}
  /* Loading */
  .loading{text-align:center;padding:40px;color:var(--text2)}
  .spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .no-results{text-align:center;padding:60px 20px;color:var(--text2)}
  .no-results .icon{font-size:40px;margin-bottom:12px}
  /* Semantic type text colors */
  .st-故障诊断{color:var(--st-fault)} .st-风险警告{color:var(--st-warn)} .st-操作步骤{color:var(--st-step)}
  .st-参数查询{color:var(--st-param)} .st-部件说明{color:var(--st-comp)} .st-电路拓扑{color:var(--st-circuit)} .st-概述说明{color:var(--st-overview)}
  /* Semantic type border-left */
  .bl-故障诊断{border-left-color:var(--st-fault)!important}
  .bl-风险警告{border-left-color:var(--st-warn)!important}
  .bl-操作步骤{border-left-color:var(--st-step)!important}
  .bl-参数查询{border-left-color:var(--st-param)!important}
  .bl-部件说明{border-left-color:var(--st-comp)!important}
  .bl-电路拓扑{border-left-color:var(--st-circuit)!important}
  .bl-概述说明{border-left-color:var(--st-overview)!important}
  /* Responsive */
  @media (max-width:900px){.kpi-row{grid-template-columns:repeat(3,1fr)}.charts-row{grid-template-columns:1fr}}
  @media (max-width:600px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="header">
  <h1>⚡ DM6 说明书 · 知识库分块数据看板</h1>
  <span class="badge" id="total-badge">-- chunks</span>
  <span class="sub" id="subtitle">加载中…</span>
</div>

<div class="container">

  <!-- KPI Cards -->
  <div class="kpi-row" id="kpi-row"></div>

  <!-- Charts -->
  <div class="charts-row">
    <div class="chart-box">
      <h3>📊 语义类型分布 <span style="font-size:11px;color:var(--text2);font-weight:400">（点击柱子筛选）</span></h3>
      <canvas id="semanticChart"></canvas>
    </div>
    <div class="chart-box">
      <h3>📈 Token 分布直方图 <span style="font-size:11px;color:var(--text2);font-weight:400">（红色虚线=阈值）</span></h3>
      <canvas id="tokenChart"></canvas>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <select id="filter-semantic"><option value="">全部语义类型</option></select>
    <select id="filter-part"><option value="">全部 PART</option></select>
    <input type="text" id="filter-search" placeholder="搜索 chunk_id / 文本…">
    <select id="filter-sort"><option value="">默认排序</option><option value="token_count">按 Token 数</option><option value="part">按 PART</option><option value="semantic_type">按语义类型</option></select>
    <select id="filter-order"><option value="asc">升序</option><option value="desc">降序</option></select>
    <label><input type="checkbox" id="filter-fault"> 仅三元组</label>
    <button class="clear-btn" onclick="clearFilters()">✕ 清除</button>
  </div>

  <!-- Chunk list -->
  <div id="chunk-list"></div>

  <!-- Pagination -->
  <div class="pagination" id="pagination"></div>

</div>

<script>
const API = 'http://localhost:8001/api/chunks';
const ICONS = {'故障诊断':'🔧','风险警告':'⚠️','操作步骤':'📋','参数查询':'📊','部件说明':'🔍','电路拓扑':'⚡','概述说明':'📝'};
const SEM_COLORS = {
  '故障诊断':'#E63946','风险警告':'#F4A261','操作步骤':'#457B9D',
  '参数查询':'#2A9D8F','部件说明':'#9B5DE5','电路拓扑':'#00B4D8','概述说明':'#6C757D'
};
const SEM_COLORS_RGBA = {
  '故障诊断':'rgba(230,57,70,0.7)','风险警告':'rgba(244,162,97,0.7)','操作步骤':'rgba(69,123,157,0.7)',
  '参数查询':'rgba(42,157,143,0.7)','部件说明':'rgba(155,93,229,0.7)','电路拓扑':'rgba(0,180,216,0.7)','概述说明':'rgba(108,117,125,0.7)'
};

let state = {
  page:1, pageSize:20, total:0, totalPages:1,
  semantic_type:'', part:'', content_type:'', search:'', has_fault:false,
  sort_by:'', sort_order:'asc',
  filtersAvailable: null, debounceTimer:null,
  currentStats: null
};
let semanticChart=null, tokenChart=null;
let expandedCache={};

async function fetchData() {
  const params = new URLSearchParams();
  if (state.semantic_type) params.set('semantic_type', state.semantic_type);
  if (state.part) params.set('part', state.part);
  if (state.content_type) params.set('content_type', state.content_type);
  if (state.search) params.set('search', state.search);
  if (state.has_fault) params.set('has_fault', 'true');
  if (state.sort_by) params.set('sort_by', state.sort_by);
  params.set('sort_order', state.sort_order);
  params.set('page', state.page);
  params.set('page_size', state.pageSize);

  document.getElementById('chunk-list').innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  try {
    const r = await fetch(API + '?' + params.toString());
    const d = await r.json();
    state.total = d.total; state.totalPages = d.total_pages; state.page = d.page;
    state.currentStats = d.stats;
    document.getElementById('total-badge').textContent = d.total + ' chunks';
    document.getElementById('subtitle').textContent = '共 ' + d.total + ' 个知识块 · ' + Object.keys(d.stats.by_semantic_type).length + ' 种语义类型';
    if (!state.filtersAvailable && d.filters_available) {
      state.filtersAvailable = d.filters_available;
      populateFilters();
    }
    renderKPIs(d.stats);
    renderCharts(d.stats);
    renderChunks(d.chunks);
    renderPagination();
  } catch(e) {
    document.getElementById('chunk-list').innerHTML = '<div class="no-results"><div class="icon">⚠️</div><p>无法连接后端: ' + esc(e.message) + '</p></div>';
  }
}

function populateFilters() {
  const fa = state.filtersAvailable;
  populateSel('filter-semantic', fa.semantic_types, '全部语义类型');
  populateSel('filter-part', fa.parts, '全部 PART');
}

function populateSel(id, options, defaultLabel) {
  const sel = document.getElementById(id);
  const val = sel.value;
  sel.innerHTML = '<option value="">' + defaultLabel + '</option>';
  options.forEach(o => { const opt = document.createElement('option'); opt.value = o; opt.textContent = o; sel.appendChild(opt); });
  sel.value = val;
}

function renderKPIs(stats) {
  const items = [
    {num: stats.total_chunks, label: 'Chunks 总数', icon: '📦', cls: 'kpi-accent'},
    {num: stats.avg_tokens, label: '平均 Token', icon: '📊', cls: 'kpi-accent', suffix: 't'},
    {num: stats.fault_triplet_count, label: '故障三元组', icon: '🔧', cls: stats.fault_triplet_count>0?'kpi-accent':'kpi-ok'},
    {num: stats.fragment_count, label: '碎片 <50t', icon: '⚠️', cls: stats.fragment_count>0?'kpi-warn':'kpi-ok'},
    {num: stats.oversized_count, label: '超大 >768t', icon: '🔴', cls: stats.oversized_count>0?'kpi-danger':'kpi-ok'},
  ];
  document.getElementById('kpi-row').innerHTML = items.map(i =>
    '<div class="kpi-card"><div class="kpi-icon">'+i.icon+'</div><div class="kpi-num '+i.cls+'">'+i.num+(i.suffix||'')+'</div><div class="kpi-label">'+i.label+'</div></div>'
  ).join('');
}

function renderCharts(stats) {
  renderSemanticChart(stats.by_semantic_type);
  renderTokenChart(stats.token_distribution);
}

function renderSemanticChart(byType) {
  const ctx = document.getElementById('semanticChart').getContext('2d');
  const entries = Object.entries(byType || {});
  const labels = entries.map(([k]) => k);
  const data = entries.map(([,v]) => v);
  const colors = labels.map(l => SEM_COLORS[l] || '#6C757D');

  if (semanticChart) semanticChart.destroy();
  semanticChart = new Chart(ctx, {
    type: 'bar',
    data: {labels, datasets: [{data, backgroundColor: colors, borderColor: colors, borderWidth: 0, borderRadius: 4}]},
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {display: false},
        tooltip: {callbacks: {label: ctx => ctx.raw + ' chunks'}}
      },
      scales: {
        x: {grid: {color:'rgba(255,255,255,0.06)'}, ticks: {color:'#8b949e', stepSize: Math.max(1, Math.ceil(Math.max(...data,1)/6))}},
        y: {grid: {display: false}, ticks: {color:'#e6edf3', font: {size:12}}}
      },
      onClick: (e, elements) => {
        if (elements.length > 0) {
          const idx = elements[0].index;
          const stype = labels[idx];
          if (state.semantic_type === stype) {
            state.semantic_type = ''; document.getElementById('filter-semantic').value = '';
          } else {
            state.semantic_type = stype; document.getElementById('filter-semantic').value = stype;
          }
          state.page = 1; fetchData();
        }
      }
    }
  });
}

function renderTokenChart(distribution) {
  const ctx = document.getElementById('tokenChart').getContext('2d');
  const labels = distribution.map(d => d.range);
  const data = distribution.map(d => d.count);
  const barColors = labels.map((l,i) => {
    if (i === 0) return 'rgba(248,81,73,0.5)';
    if (i === 5) return 'rgba(210,153,29,0.5)';
    return 'rgba(63,185,80,0.5)';
  });

  if (tokenChart) tokenChart.destroy();
  tokenChart = new Chart(ctx, {
    type: 'bar',
    data: {labels, datasets: [{data, backgroundColor: barColors, borderColor: barColors.map(c=>c.replace('0.5','0.8')), borderWidth: 1, borderRadius: 4}]},
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {display: false},
        tooltip: {callbacks: {label: ctx => ctx.raw + ' chunks'}},
        annotation_line1: {type:'line',xMin:0,xMax:0,borderColor:'#f85149',borderWidth:1,borderDash:[4,4],label:{content:'碎片阈值 50t',display:true,color:'#f85149',font:{size:10}}},
        annotation_line2: {type:'line',xMin:6,xMax:6,borderColor:'#f85149',borderWidth:1,borderDash:[4,4],label:{content:'硬上限 768t',display:true,color:'#f85149',font:{size:10}}}
      }.annotation_line1 ? {} : {legend: {display: false}},  // annotation plugin not loaded - skip
      scales: {
        x: {grid: {color:'rgba(255,255,255,0.06)'}, ticks: {color:'#8b949e', font:{size:11}}},
        y: {grid: {color:'rgba(255,255,255,0.06)'}, ticks: {color:'#8b949e', stepSize: Math.max(1, Math.ceil(Math.max(...data,1)/5))}, title: {display:true, text:'chunks', color:'#8b949e'}}
      }
    }
  });
}

function renderChunks(chunks) {
  if (chunks.length === 0) {
    document.getElementById('chunk-list').innerHTML = '<div class="no-results"><div class="icon">📭</div><p>没有匹配的分块</p></div>';
    return;
  }
  let html = '';
  chunks.forEach(c => {
    const icon = ICONS[c.semantic_type] || '📝';
    const stCls = 'st-' + (c.semantic_type||'');
    const blCls = 'bl-' + (c.semantic_type||'');
    const tc = c.token_count;
    let tokenCls = 't-green';
    if (tc < 50) tokenCls = 't-red';
    else if (tc > 768) tokenCls = 't-red';
    else if (tc > 512) tokenCls = 't-yellow';
    const pct = Math.min(100, Math.round(tc / 768 * 100));
    let barColor = 'var(--green)';
    if (tc < 50) barColor = 'var(--red)';
    else if (tc > 768) barColor = 'var(--red)';
    else if (tc > 512) barColor = 'var(--orange)';
    const preview = (c.text||'').replace(/\n/g,' ').slice(0, 120) + ((c.text||'').length>120?'…':'');
    const partLabel = (c.part||'') + ' · ' + (c.section||'未知');
    let chips = '';
    (c.component||[]).forEach(co => chips += '<span class="chip chip-comp">🔩 '+esc(co)+'</span>');
    if (c.fault_triplet && c.fault_triplet.length>0) chips += '<span class="chip chip-trip">🔺 三元组×'+c.fault_triplet.length+'</span>';
    (c.domain_tags||[]).forEach(t => chips += '<span class="chip chip-domain">🏷 '+esc(t)+'</span>');
    if (c.warning_level) chips += '<span class="chip chip-warn">⚠ '+esc(c.warning_level)+'</span>';

    html += '<div class="chunk-card '+blCls+'" id="card-'+escAttr(c.chunk_id)+'" onclick="toggleCard(\''+escAttr(c.chunk_id)+'\')">'+
      '<div class="card-top">'+
        '<span class="type-icon">'+icon+'</span>'+
        '<span class="part-label '+stCls+'">'+esc(partLabel)+'</span>'+
        '<span class="token-badge '+tokenCls+'">'+tc+'t</span>'+
        '<span style="font-size:10px;color:var(--text2)">'+pct+'%</span>'+
      '</div>'+
      '<div class="progress-bar"><div class="fill" style="width:'+pct+'%;background:'+barColor+'"></div></div>'+
      '<div class="card-preview">'+esc(preview)+'</div>'+
      '<div class="chips">'+chips+'</div>'+
      '<div class="chunk-detail" id="detail-'+escAttr(c.chunk_id)+'"></div>'+
    '</div>';
  });
  document.getElementById('chunk-list').innerHTML = html;
}

function toggleCard(chunkId) {
  const card = document.getElementById('card-'+chunkId);
  if (!card) return;
  const detail = document.getElementById('detail-'+chunkId);
  if (!detail) return;
  if (card.classList.contains('expanded')) { card.classList.remove('expanded'); return; }
  card.classList.add('expanded');
  if (expandedCache[chunkId]) { detail.innerHTML = expandedCache[chunkId]; return; }
  fetch('http://localhost:8001/api/chunks/' + encodeURIComponent(chunkId))
    .then(r => r.json()).then(c => {
      let h = '';
      h += '<div class="detail-section"><h4>📄 完整文本</h4><div class="detail-text">'+esc(c.text||'')+'</div></div>';
      if (c.fault_triplet && c.fault_triplet.length > 0) {
        h += '<div class="detail-section"><h4>🔺 故障三元组 ('+c.fault_triplet.length+')</h4>';
        c.fault_triplet.forEach(t => {
          h += '<div class="triplet-card">'+
            '<div class="trip-row"><span class="trip-label">症状</span><span>'+esc(t.symptom||'—')+'</span></div>'+
            '<div class="trip-row"><span class="trip-label">原因</span><span>'+esc(t.cause||'—')+'</span></div>'+
            '<div class="trip-row"><span class="trip-label">处理</span><span>'+esc(t.action||'—')+'</span></div>';
          if (t.component) h += '<div class="trip-row"><span class="trip-label">部件</span><span>'+esc(t.component||'')+'</span></div>';
          if (t.can_diy !== undefined) h += '<div class="trip-row"><span class="trip-label">可DIY</span><span>'+(t.can_diy?'✅ 是':'❌ 否')+'</span></div>';
          h += '</div>';
        });
        h += '</div>';
      }
      if (c.important_kwd) h += '<div class="detail-section"><h4>🔑 重要关键词</h4><div class="val">'+esc(c.important_kwd)+'</div></div>';
      if (c.question_kwd) h += '<div class="detail-section"><h4>❓ 预设问题</h4><div class="val">'+esc(c.question_kwd).replace(/\n/g,'<br>')+'</div></div>';
      if (c.parent_id || (c.child_ids&&c.child_ids.length>0)) {
        h += '<div class="detail-section"><h4>🔗 关联</h4><div class="val">';
        if (c.parent_id) h += 'parent: <b>'+esc(c.parent_id)+'</b> ';
        if (c.child_ids&&c.child_ids.length>0) h += 'children: <b>'+c.child_ids.map(esc).join(', ')+'</b>';
        h += '</div></div>';
      }
      if (c.repair_level||c.risk_level) {
        h += '<div class="detail-section"><h4>⚙️ 等级</h4><div class="val">';
        if (c.repair_level) h += '维修: <b>'+esc(c.repair_level)+'</b> ';
        if (c.risk_level) h += '风险: <b>'+esc(c.risk_level)+'</b>';
        h += '</div></div>';
      }
      expandedCache[chunkId] = h; detail.innerHTML = h;
    }).catch(err => { detail.innerHTML = '<div style="color:var(--red)">加载失败: '+esc(err.message)+'</div>'; });
}

function renderPagination() {
  const el = document.getElementById('pagination');
  if (state.totalPages <= 1) { el.innerHTML = state.total > 0 ? '<div class="total-info">共 '+state.total+' 条</div>' : ''; return; }
  el.innerHTML =
    '<button '+(state.page<=1?'disabled':'')+' onclick="goPage('+(state.page-1)+')">← 上一页</button>'+
    '<span class="page-info">第 <b>'+state.page+'</b> / '+state.totalPages+' 页</span>'+
    '<button '+(state.page>=state.totalPages?'disabled':'')+' onclick="goPage('+(state.page+1)+')">下一页 →</button>'+
    '<span class="total-info">共 '+state.total+' 条</span>';
}

function goPage(p) { state.page = p; fetchData(); window.scrollTo({top:0,behavior:'smooth'}); }
function clearFilters() {
  state.semantic_type=''; state.part=''; state.search=''; state.has_fault=false; state.sort_by=''; state.sort_order='asc';
  document.getElementById('filter-semantic').value='';
  document.getElementById('filter-part').value='';
  document.getElementById('filter-search').value='';
  document.getElementById('filter-sort').value='';
  document.getElementById('filter-order').value='asc';
  document.getElementById('filter-fault').checked=false;
  state.page=1; fetchData();
}

// Event listeners
document.getElementById('filter-semantic').addEventListener('change', function(){state.semantic_type=this.value;state.page=1;fetchData();});
document.getElementById('filter-part').addEventListener('change', function(){state.part=this.value;state.page=1;fetchData();});
document.getElementById('filter-search').addEventListener('input', function(){state.search=this.value.trim();clearTimeout(state.debounceTimer);state.debounceTimer=setTimeout(()=>{state.page=1;fetchData();},500);});
document.getElementById('filter-sort').addEventListener('change', function(){state.sort_by=this.value;state.page=1;fetchData();});
document.getElementById('filter-order').addEventListener('change', function(){state.sort_order=this.value;state.page=1;fetchData();});
document.getElementById('filter-fault').addEventListener('change', function(){state.has_fault=this.checked;state.page=1;fetchData();});

function esc(s){const d=document.createElement('div');d.textContent=(s||'').toString();return d.innerHTML;}
function escAttr(s){return (s||'').toString().replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Init
fetchData();
</script>
