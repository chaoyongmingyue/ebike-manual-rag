<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雅迪 DM6 智能助手 v6</title>
<style>
  :root {
    --sidebar-bg: #1B1C2E; --sidebar-hover: #262741;
    --main-bg: #F7F8FC; --card-bg: #FFFFFF;
    --text: #1A1A2E; --text-secondary: #6B7280;
    --accent: #4F46E5; --accent-hover: #4338CA;
    --border: #E5E7EB; --shadow: 0 1px 3px rgba(0,0,0,.08);
    --green: #22C55E; --amber: #F59E0B;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;display:flex;height:100vh;background:var(--main-bg)}
  .sidebar{width:260px;background:var(--sidebar-bg);color:#fff;display:flex;flex-direction:column;flex-shrink:0}
  .sidebar-header{padding:20px;border-bottom:1px solid rgba(255,255,255,.08)}
  .sidebar-header h1{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
  .sidebar-header h1 .icon{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
  .sidebar-header p{font-size:11px;color:rgba(255,255,255,.45);margin-top:6px}
  .new-chat-btn{margin:16px;padding:10px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;transition:background .15s}
  .new-chat-btn:hover{background:var(--accent-hover)}
  .sidebar-nav{flex:1;overflow-y:auto;padding:0 12px}
  .sidebar-nav .section{font-size:10px;text-transform:uppercase;color:rgba(255,255,255,.3);padding:12px 8px 4px;letter-spacing:.5px}
  .sidebar-nav .chat-item{padding:10px 8px;border-radius:6px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.7);margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;transition:all .15s;display:flex;justify-content:space-between;align-items:center}
  .sidebar-nav .chat-item:hover{background:var(--sidebar-hover)}
  .sidebar-nav .chat-item.active{background:rgba(255,255,255,.12);color:#fff}
  .chat-item .del{opacity:0;font-size:11px;transition:opacity .15s;flex-shrink:0;margin-left:4px}
  .chat-item:hover .del{opacity:.6}.chat-item .del:hover{opacity:1;color:#EF4444}
  .sidebar-footer{padding:16px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:rgba(255,255,255,.3)}
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .main-header{padding:16px 24px;background:var(--card-bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .main-header h2{font-size:15px;font-weight:600;color:var(--text)}
  .status{font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:6px}
  .status .dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
  .chat-area{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
  .welcome{text-align:center;padding:60px 20px 40px}
  .welcome .logo{width:56px;height:56px;background:var(--accent);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:16px;color:#fff}
  .welcome h3{font-size:20px;color:var(--text);margin-bottom:8px;font-weight:600}
  .welcome p{font-size:13px;color:var(--text-secondary);max-width:400px;margin:0 auto 24px;line-height:1.6}
  .suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
  .suggestion{padding:8px 16px;background:var(--card-bg);border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:13px;color:var(--text);transition:all .15s}
  .suggestion:hover{border-color:var(--accent);color:var(--accent);background:#F5F3FF}
  .message{display:flex;gap:12px;max-width:820px;animation:fadeIn .3s}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .message.user{align-self:flex-end;flex-direction:row-reverse}
  .msg-avatar{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600}
  .message.ai .msg-avatar{background:#EEF2FF;color:var(--accent)}
  .message.user .msg-avatar{background:var(--accent);color:#fff}
  .msg-content{padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.7;color:var(--text);max-width:100%;word-break:break-word}
  .message.ai .msg-content{background:var(--card-bg);border:1px solid var(--border);border-top-left-radius:4px;box-shadow:var(--shadow)}
  .message.user .msg-content{background:#E8ECFF;border-top-right-radius:4px}
  .typing{display:flex;gap:8px;align-items:center;padding:4px 0}
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:typing 1.4s infinite both}
  .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  @keyframes typing{0%,60%,100%{opacity:.2}30%{opacity:1}}
  .sources-box{margin-top:12px}
  .sources-box summary{font-size:12px;color:var(--text-secondary);cursor:pointer;font-weight:500;margin-bottom:8px;user-select:none}
  .source-item{padding:10px 12px;background:#F9FAFB;border-radius:8px;border:1px solid var(--border);font-size:12px;margin-bottom:6px;transition:all .15s}
  .source-item.in-context{border-left:3px solid var(--green);background:#F0FDF4}
  .source-item.not-in-context{border-left:3px solid var(--amber);opacity:.85}
  .source-header{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
  .source-label{font-weight:600;color:var(--accent);flex:1;min-width:150px}
  .source-type-icon{font-size:14px}
  .source-type-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
  .source-type-badge.used{background:#DCFCE7;color:#166534}
  .source-type-badge.unused{background:#FEF3C7;color:#92400E}
  .source-score{color:var(--text-secondary);font-size:11px;white-space:nowrap}
  .source-components{font-size:10px;color:var(--accent);margin-top:2px}
  .source-preview{color:var(--text-secondary);line-height:1.6}
  .source-full{max-height:0;overflow:hidden;transition:max-height .3s ease;color:var(--text);line-height:1.7;white-space:pre-wrap}
  .source-full.open{max-height:500px;overflow-y:auto;margin-top:6px;padding:8px 10px;background:#FFF;border-radius:6px;border:1px solid #EEE}
  .source-expand-btn{display:inline-block;margin-top:6px;font-size:11px;color:var(--accent);cursor:pointer;user-select:none;background:none;border:none;padding:2px 0;font-family:inherit}
  .source-expand-btn:hover{text-decoration:underline}
  .input-area{padding:16px 24px;background:var(--card-bg);border-top:1px solid var(--border)}
  .input-wrapper{max-width:820px;margin:0 auto;display:flex;gap:10px;align-items:flex-end;background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:8px 12px;transition:border-color .15s;box-shadow:0 2px 8px rgba(0,0,0,.04)}
  .input-wrapper:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
  .input-wrapper textarea{flex:1;border:none;outline:none;resize:none;font-size:14px;font-family:inherit;line-height:1.5;padding:4px 0;min-height:24px;max-height:120px;color:var(--text);background:transparent}
  .input-wrapper textarea::placeholder{color:#9CA3AF}
  .send-btn{width:36px;height:36px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center}
  .send-btn:hover{background:var(--accent-hover)}
  .send-btn:disabled{background:#D1D5DB;cursor:not-allowed}
  .input-hint{text-align:center;font-size:11px;color:var(--text-secondary);margin-top:8px}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header"><h1><span class="icon">⚡</span>Yadea DM6</h1><p>电动自行车智能知识库 v6</p></div>
  <button class="new-chat-btn" onclick="newChat()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>新对话</button>
  <div class="sidebar-nav"><div class="section">历史对话</div><div id="history-list"></div></div>
  <div class="sidebar-footer">BGE-M3 · Qwen2.5-7B · v6</div>
</div>
<div class="main">
  <div class="main-header"><h2 id="chat-title">新对话</h2><div class="status"><span class="dot"></span><span id="status-text">知识库就绪 · 82 条文档</span></div></div>
  <div class="chat-area" id="chat-area">
    <div class="welcome">
      <div class="logo">⚡</div><h3>雅迪 DM6 智能助手 v6</h3>
      <p>基于官方说明书的 RAG 知识库问答系统。支持智能路由、LLM重排、元数据增强。可询问电池充电、安全注意事项、仪表操作、故障排除等问题。</p>
      <div class="suggestions">
        <span class="suggestion" onclick="askSuggestion(this)">电池怎么充电</span>
        <span class="suggestion" onclick="askSuggestion(this)">充电时有哪些安全注意事项</span>
        <span class="suggestion" onclick="askSuggestion(this)">控制器保修多久</span>
        <span class="suggestion" onclick="askSuggestion(this)">调速失灵怎么修</span>
        <span class="suggestion" onclick="askSuggestion(this)">仪表盘指示灯代表什么意思</span>
      </div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="query-input" placeholder="输入问题，Enter 发送，Shift+Enter 换行…" rows="1" onkeydown="handleKeydown(event)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" title="发送">▲</button>
    </div>
    <div class="input-hint">说明书知识库 · Yadea DM6 · v6 智能路由</div>
  </div>
</div>
<script>
const API_BASE='http://localhost:8000';
const STORAGE_KEY='ebike_chats_v3';
let isStreaming=false,allChats=[],chatHistory=[],currentChatId=null;

// Type icon mapping
const TYPE_ICONS={'故障诊断':'🔧','风险警告':'⚠️','操作步骤':'📋','参数查询':'📊','部件说明':'🔍','电路拓扑':'⚡','概述说明':'📝'};

function loadChats(){try{allChats=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch(e){allChats=[]}}
function saveChats(){localStorage.setItem(STORAGE_KEY,JSON.stringify(allChats))}
function persistCurrent(){
  if(!currentChatId||chatHistory.length===0)return;
  const title=(chatHistory.find(m=>m.role==='user')||{}).query||'对话';
  const data={id:currentChatId,title:title.slice(0,30),messages:chatHistory,updated:Date.now()};
  const idx=allChats.findIndex(c=>c.id===currentChatId);
  if(idx>=0)allChats[idx]=data;else allChats.unshift(data);
  if(allChats.length>50)allChats=allChats.slice(0,50);
  saveChats()
}
function deleteChat(id){allChats=allChats.filter(c=>c.id!==id);saveChats();if(currentChatId===id)newChat();renderSidebar()}
function loadChat(id){
  if(isStreaming)return;persistCurrent();
  const chat=allChats.find(c=>c.id===id);if(!chat)return;
  currentChatId=chat.id;chatHistory=chat.messages;
  document.getElementById('chat-title').textContent=chat.title;
  const area=document.getElementById('chat-area');area.innerHTML='';
  chat.messages.forEach(m=>renderMessage(m,area));
  area.scrollTop=area.scrollHeight;renderSidebar()
}
function renderSidebar(){
  const list=document.getElementById('history-list');
  if(allChats.length===0){list.innerHTML='<div style="font-size:12px;color:rgba(255,255,255,.3);padding:8px">暂无历史对话</div>';return}
  list.innerHTML=allChats.map(c=>{
    const active=c.id===currentChatId?' active':'';
    return '<div class="chat-item'+active+'" onclick="loadChat(\''+c.id+'\')"><span style="flex:1;overflow:hidden;text-overflow:ellipsis" title="'+esc(c.title)+'">'+esc(c.title)+'</span><span class="del" onclick="event.stopPropagation();deleteChat(\''+c.id+'\')" title="删除">✕</span></div>'
  }).join('')
}
function newChat(){
  if(isStreaming)return;persistCurrent();
  currentChatId=Date.now().toString(36);
  document.getElementById('chat-area').innerHTML='<div class="welcome"><div class="logo">⚡</div><h3>雅迪 DM6 智能助手 v6</h3><p>基于官方说明书的 RAG 知识库问答系统。</p><div class="suggestions"><span class="suggestion" onclick="askSuggestion(this)">电池怎么充电</span><span class="suggestion" onclick="askSuggestion(this)">充电时有哪些安全注意事项</span><span class="suggestion" onclick="askSuggestion(this)">控制器保修多久</span><span class="suggestion" onclick="askSuggestion(this)">调速失灵怎么修</span><span class="suggestion" onclick="askSuggestion(this)">仪表盘指示灯代表什么意思</span></div></div>';
  document.getElementById('chat-title').textContent='新对话';chatHistory=[];renderSidebar()
}
function renderMessage(msg,area){
  if(msg.role==='user'){
    const el=document.createElement('div');el.className='message user';
    el.innerHTML='<div class="msg-avatar">U</div><div class="msg-content">'+esc(msg.query)+'</div>';
    area.appendChild(el)
  }else{
    const el=document.createElement('div');el.className='message ai';
    let clean=(msg.answer||'').replace(/^Thinking Process:[\s\S]*\n\n/,'').trim();
    if(!clean)clean=msg.answer||'';
    let srcHtml='';
    if(msg.sources&&msg.sources.length>0)srcHtml=buildSourcesHtml(msg.sources);
    el.innerHTML='<div class="msg-avatar">AI</div><div class="msg-content"><div class="answer-text">'+esc(clean).replace(/\n/g,'<br>')+'</div>'+srcHtml+'</div>';
    area.appendChild(el)
  }
}
function buildSourcesHtml(sources){
  const inCtx=sources.filter(s=>s.in_context).length;
  let html='<details class="sources-box"><summary>📚 参考来源 ('+sources.length+' 条，'+inCtx+' 条已选用)</summary>';
  sources.forEach(s=>{
    const cls=s.in_context?'in-context':'not-in-context';
    const badge=s.in_context?'<span class="source-type-badge used">✅ 已选用</span>':'<span class="source-type-badge unused">仅检索</span>';
    const icon=TYPE_ICONS[s.semantic_type]||'📝';
    const label=esc(s.part)+' · '+esc(s.section);
    const stype=s.semantic_type||'';
    // Component tags
    let compHtml='';
    if(s.component&&Array.isArray(s.component)&&s.component.length>0){
      compHtml='<span class="source-components">🔧 '+s.component.map(c=>esc(c)).join(', ')+'</span>';
    }
    // Domain tags
    let tagHtml='';
    if(s.domain_tags&&Array.isArray(s.domain_tags)&&s.domain_tags.length>0){
      tagHtml='<span style="font-size:10px;color:var(--text-secondary);margin-left:4px">'+s.domain_tags.map(t=>'#'+esc(t)).join(' ')+'</span>';
    }
    const expandBtn=s.text_is_short?'':'<button class="source-expand-btn" onclick="toggleSource(\'full-'+esc(s.chunk_id)+'\',this)">[展开]</button>';
    html+='<div class="source-item '+cls+'"><div class="source-header"><span class="source-type-icon">'+icon+'</span><span class="source-label">'+label+'</span>'+tagHtml+badge+'<span class="source-score">'+s.score.toFixed(3)+'</span></div>'+compHtml+'<div class="source-preview">'+esc(s.text_preview)+'</div><div class="source-full" id="full-'+esc(s.chunk_id)+'">'+esc(s.text_full||s.text_preview)+'</div>'+expandBtn+'</div>'
  });
  html+='</details>';return html
}
function toggleSource(id,btn){
  const el=document.getElementById(id);if(!el)return;
  const isOpen=el.classList.toggle('open');
  btn.textContent=isOpen?'[收起]':'[展开]'
}
async function sendMessage(){
  const input=document.getElementById('query-input');
  const query=input.value.trim();
  if(!query||isStreaming)return;
  input.value='';input.style.height='auto';isStreaming=true;
  document.getElementById('send-btn').disabled=true;
  const area=document.getElementById('chat-area');
  const welcome=area.querySelector('.welcome');if(welcome)welcome.remove();
  const uDiv=document.createElement('div');uDiv.className='message user';
  uDiv.innerHTML='<div class="msg-avatar">U</div><div class="msg-content">'+esc(query)+'</div>';
  area.appendChild(uDiv);
  chatHistory.push({role:'user',query,time:new Date().toISOString()});
  if(chatHistory.filter(m=>m.role==='user').length===1)
    document.getElementById('chat-title').textContent=query.slice(0,30)+(query.length>30?'…':'');
  const aDiv=document.createElement('div');aDiv.className='message ai';
  aDiv.id='ai-'+Date.now();
  aDiv.innerHTML='<div class="msg-avatar">AI</div><div class="msg-content"><div class="typing"><span></span><span></span><span></span></div></div>';
  area.appendChild(aDiv);area.scrollTop=area.scrollHeight;
  try{
    const resp=await fetch(API_BASE+'/api/chat/stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query,top_k:5})});
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const reader=resp.body.getReader();
    const decoder=new TextDecoder();
    let buffer='',answerText='',sources=[];
    const contentDiv=aDiv.querySelector('.msg-content');
    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      buffer+=decoder.decode(value,{stream:true});
      const lines=buffer.split('\n');buffer=lines.pop()||'';
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        try{
          const d=JSON.parse(line.slice(6));
          if(d.type==='start')contentDiv.innerHTML='<span style="color:var(--text-secondary)">⏳ 正在生成…</span>';
          else if(d.type==='thinking')contentDiv.innerHTML='<span style="color:var(--text-secondary)">🤔 分析中…</span>';
          else if(d.type==='token'){
            if(!answerText)contentDiv.innerHTML='';
            answerText+=d.content;
            contentDiv.innerHTML='<div class="answer-text">'+esc(answerText).replace(/\n/g,'<br>')+'</div>'
          }else if(d.type==='sources')sources=d.sources
        }catch(e){}
      }
      area.scrollTop=area.scrollHeight
    }
    let cleanAnswer=answerText.replace(/^Thinking Process:[\s\S]*\n\n/,'').trim();
    if(!cleanAnswer)cleanAnswer=answerText;
    let srcHtml='';if(sources.length>0)srcHtml=buildSourcesHtml(sources);
    contentDiv.innerHTML='<div class="answer-text">'+esc(cleanAnswer).replace(/\n/g,'<br>')+'</div>'+srcHtml;
    chatHistory.push({role:'ai',answer:cleanAnswer,sources,time:new Date().toISOString()});
    persistCurrent();renderSidebar()
  }catch(err){
    aDiv.querySelector('.msg-content').innerHTML='<span style="color:#EF4444">请求失败: '+esc(err.message)+'</span>'
  }finally{
    isStreaming=false;document.getElementById('send-btn').disabled=false;
    document.getElementById('query-input').focus()
  }
}
function askSuggestion(el){document.getElementById('query-input').value=el.textContent;sendMessage()}
function handleKeydown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
document.getElementById('query-input').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'});
loadChats();renderSidebar();newChat();
fetch(API_BASE+'/api/health').then(r=>r.json()).then(d=>{document.getElementById('status-text').textContent='知识库就绪 · '+d.qdrant_points+' 条文档'}).catch(()=>{document.getElementById('status-text').innerHTML='<span style="color:#EF4444">后端未连接</span>'});
document.getElementById('query-input').focus()
</script>
</body>
</html>
