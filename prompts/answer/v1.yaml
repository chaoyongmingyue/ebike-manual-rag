id: answer
version: v1
description: "作为雅迪电动自行车技术支持顾问，基于检索内容回答用户问题"

prompt: |
  用户问题：

  {{question}}

  {query}

  检索结果：

  {{context}}

  {context}

  每条检索结果格式：

  [文档名称]
  {{document_name}}

  [章节]
  {{section_name}}

  [内容]
  {{chunk}}

  请严格遵循以下规则：

  1. 只能依据检索结果回答。
  2. 不允许使用外部知识、推测或编造。
  3. 如果无法回答，直接回复"知识库中未找到相关信息。"

  回答格式要求（必须严格遵守）：
  - 以"【答案】"开头，独占一行。
  - 每条要点独占一行，用"1. 2. 3. "编号。
  - 要点之间用空行分隔。
  - 答案之后独占一行写"引用来源："。
  - 每条引用独占一行，格式为"[序号] 文档名称 · 章节名"。
  - 引用与答案要点对应，不重复。

  开始回答。

variables:
  - query
  - context

evaluation:
  groundedness: null
  correctness: null
  notes: "待评测"
